<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/resumes">Resume Analyzer</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/resumes">Resume List</a>
            <a class="nav-link" href="/add-resume">Add Resume</a>
        </div>
    </div>
</nav>

<div class="card mx-auto shadow p-4" style="max-width: 600px;">

    <h2 class="text-center mb-4">Edit Resume</h2>

    <form action="/update-resume" method="post">

        <input type="hidden" name="id" th:value="${resume.id}">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text"
                   name="name"
                   class="form-control"
                   th:value="${resume.name}">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   name="email"
                   class="form-control"
                   th:value="${resume.email}">
        </div>

        <div class="mb-3">
            <label class="form-label">Skills</label>
            <input type="text"
                   name="skills"
                   class="form-control"
                   th:value="${resume.skills}">
        </div>

        <div class="mb-3">
            <label class="form-label">ATS Score</label>
            <input type="number"
                   name="atsScore"
                   class="form-control"
                   th:value="${resume.atsScore}">
        </div>

        <button type="submit" class="btn btn-warning w-100">
            Update Resume
        </button>

    </form>

</div>

</body>
</html>
