<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Analysis History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>

        body{
            background:#f5f7fa;
        }

        .dashboard-card{
            border:none;
            border-radius:20px;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .dashboard-card:hover{
            transform:translateY(-5px);
        }

        .dashboard-value{
            font-size:32px;
            font-weight:bold;
        }

        .best-card{
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .chart-card{
            border-radius:20px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        table{
            box-shadow:0 8px 20px rgba(0,0,0,0.12);
        }
        .dark-mode{
            background:#121212 !important;
            color:white !important;
        }

        .dark-mode .card{
            background:#1e1e1e !important;
            color:white !important;
        }

        .dark-mode table{
            color:white !important;
        }

        .dark-mode .table{
            background:#1e1e1e !important;
        }

        .dark-mode .navbar{
            background:#000 !important;
        }
        .dark-mode .table-dark{
            background:#000 !important;
        }

        .dark-mode .form-control{
            background:#2b2b2b;
            color:white;
            border-color:#555;
        }

        .dark-mode .btn-secondary{
            background:#444;
            border:none;
        }

    </style>
</head>

<body id="pageBody">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark rounded mb-4">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            Resume Analyzer
        </a>

        <a class="nav-link" href="/">
            Home
        </a>

        <div class="navbar-nav">
            <a class="nav-link" href="/resumes">
                Resume List
            </a>

            <a class="nav-link" href="/upload">
                Upload PDF
            </a>

            <a class="nav-link active" href="/history">
                History
            </a>
        </div>

    </div>
</nav>
<div class="container mt-5">
<div class="text-end mb-3">

    <button
            class="btn btn-dark"
            onclick="toggleDarkMode()">

        🌙 Dark Mode

    </button>

</div>
<h2 class="mb-4 text-center fw-bold">
    ATS Analysis History
</h2>
<form action="/search-history"
      method="get"
      class="mb-4">

    <div class="input-group">

        <input type="text"
               name="keyword"
               class="form-control"
               placeholder="Search by File Name">

        <button class="btn btn-primary"
                type="submit">
            Search
        </button>

        <a href="/history"
           class="btn btn-secondary">
            Reset
        </a>

    </div>

</form>


<div class="row mb-4">

    <div class="col-md-4">
        <div class="card dashboard-card text-bg-primary">
            <div class="card-body text-center">
                <h5>Total Analyses</h5>
                <h2 class="dashboard-value"
                    th:text="${totalAnalyses}">
                </h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card dashboard-card text-bg-success">
            <div class="card-body text-center">
                <h5>Highest ATS</h5>
                <h2 class="dashboard-value"
                    th:text="${highestScore} + '%'">
                </h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card dashboard-card text-bg-warning">
            <div class="card-body text-center">
                <h5>Average ATS</h5>
                <h2 class="dashboard-value"
                    th:text="${averageScore} + '%'">
                </h2>
            </div>
        </div>
    </div>

</div>
<div class="card best-card border-success mb-4">

    <div class="card-header bg-success text-white fw-bold">
        🏆 Top Performing Resume
    </div>

    <div class="card-body">

        <h5 th:text="${topResume.fileName}">
            Resume Name
        </h5>

        <h3 class="text-success fw-bold"
            th:text="${topResume.atsScore} + '%'">
            0%
        </h3>

    </div>

</div>
<table class="table table-bordered table-striped table-hover bg-white">

    <thead class="table-dark">
    <tr>
        <th>#</th>
        <th>File Name</th>
        <th>ATS Score</th>
        <th>Date & Time</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="history, historyStat : ${historyList}">
        <td th:text="${historyStat.count}"></td>

        <td th:text="${history.fileName}"></td>

        <td>

    <span th:if="${history.atsScore >= 80}"
          class="badge bg-success"
          th:text="${history.atsScore} + '%'">
    </span>

            <span th:if="${history.atsScore >= 60 and history.atsScore < 80}"
                  class="badge bg-warning text-dark"
                  th:text="${history.atsScore} + '%'">
    </span>

            <span th:if="${history.atsScore < 60}"
                  class="badge bg-danger"
                  th:text="${history.atsScore} + '%'">
    </span>

        </td>

        <td th:text="${#temporals.format(history.analyzedAt, 'dd-MMM-yyyy hh:mm a')}"></td>

        <td>
            <a th:href="@{/delete-history/{id}(id=${history.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('⚠️ This record will be permanently deleted. Continue?')">
                Delete
            </a>
        </td>
    </tr>

    </tbody>

</table>

<div class="card chart-card mt-4">

    <div class="card-body">

        <h4 class="text-center">
            ATS Score Chart
        </h4>

        <canvas id="atsChart"></canvas>

    </div>

</div>

<br>

<div class="text-center">

    <a href="/upload"
       class="btn btn-primary">
        Analyze New Resume
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

    const labels = [[${chartLabels}]];
    const scores = [[${chartScores}]];

    new Chart(
        document.getElementById('atsChart'),
        {
            type: 'bar',

            data: {
                labels: labels,

                datasets: [{
                    label: 'ATS Score',
                    data: scores
                }]
            },

            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        }
    );

</script>
<script>

    function toggleDarkMode() {

        document
            .getElementById("pageBody")
            .classList
            .toggle("dark-mode");
    }

</script>
</div>
</body>
</html>
