<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Verify OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            font-family:'Segoe UI',sans-serif;
        }

        .card{

            width:430px;

            border:none;

            border-radius:25px;

            padding:35px;

            background:rgba(255,255,255,.18);

            backdrop-filter:blur(18px);

            box-shadow:0 10px 35px rgba(0,0,0,.25);

            color:white;

            animation:fadeIn .7s ease;

        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .icon{

            font-size:65px;

            text-align:center;

            margin-bottom:15px;

        }

        .form-control{

            height:55px;

            border-radius:12px;

            font-size:22px;

            text-align:center;

            letter-spacing:8px;

            font-weight:bold;

        }

        .btn-success{

            height:50px;

            border-radius:12px;

            font-size:18px;

            font-weight:bold;

            transition:.3s;

        }

        .btn-success:hover{

            transform:scale(1.03);

        }

        .timer{

            text-align:center;

            margin-top:15px;

            font-size:15px;

            opacity:.9;

        }

        .resend{

            text-align:center;

            margin-top:8px;

        }

        .resend a{

            color:white;

            text-decoration:none;

            font-weight:bold;

        }

        .resend a:hover{

            text-decoration:underline;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="icon">
        🔐
    </div>

    <h2 class="text-center fw-bold">
        Verify OTP
    </h2>

    <p class="text-center mb-4">

        Enter the verification code sent
        to your registered email.

    </p>

    <div th:if="${error}"
         class="alert alert-danger"
         th:text="${error}">
    </div>

    <form action="/verify-otp"
          method="post">

        <label class="form-label">

            <i class="fa-solid fa-key"></i>

            One Time Password

        </label>

        <input

                type="text"

                name="otp"

                maxlength="6"

                class="form-control mb-4"

                placeholder="------"

                required>

        <button

                type="submit"

                class="btn btn-success w-100">

            <i class="fa-solid fa-circle-check"></i>

            Verify OTP

        </button>

    </form>

    <div class="timer">

        OTP is valid for <strong>5 minutes</strong>

    </div>

    <div class="resend">

        Didn't receive the OTP?

        <br>

        <a href="/forgot-password">

            Send Again

        </a>

    </div>

</div>

</body>
</html>
