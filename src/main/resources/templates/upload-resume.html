<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resume Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>

    body{
        background:#f5f7fa;
    }

    .card{
        border:none;
        border-radius:20px;
        box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .navbar{
        box-shadow:0 4px 10px rgba(0,0,0,0.15);
    }

</style>
</head>

<body class="container mt-5">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark rounded mb-4">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            Resume Analyzer
        </a>

        <div class="navbar-nav">

            <a class="nav-link" href="/">
                Home
            </a>

            <a class="nav-link" href="/resumes">
                Resume List
            </a>

            <a class="nav-link active" href="/upload">
                Upload PDF
            </a>

            <a class="nav-link" href="/history">
                History
            </a>

        </div>

    </div>

</nav>

<div class="card mx-auto shadow p-4" style="max-width: 700px;">

    <h2 class="text-center mb-2 fw-bold">
        📄 Resume ATS Analyzer
    </h2>

    <p class="text-center text-muted mb-4">
        Upload your resume and compare it with job requirements.
    </p>

    <form action="/upload-resume"
          method="post"
          enctype="multipart/form-data">

        <label class="form-label">
            Upload Resume PDF
        </label>

        <input type="file"
               name="file"
               class="form-control mb-3"
               required>

        <label class="form-label">
            Job Description
        </label>

        <textarea
                name="jobDescription"
                class="form-control mb-3"
                rows="8"
                placeholder="Paste Job Description Here..."
                required></textarea>

        <div class="alert alert-info mt-2">

            <strong>Example Skills:</strong><br>

            java, spring boot, mysql, html, css, javascript

        </div>





        <button type="submit"
                class="btn btn-success w-100">

            🚀 Analyze Resume

        </button>

    </form>

</div>
<footer class="text-center mt-5">

    <hr>

    <p>
        Made by Anshul Ahlawat 🚀
    </p>

    <p>
        📧 anshulahlawat85@gmail.com
    </p>

</footer>
</body>
</html>
