<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Reset Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            font-family:'Segoe UI',sans-serif;
        }

        .card{

            width:430px;

            border:none;

            border-radius:25px;

            padding:35px;

            background:rgba(255,255,255,.18);

            backdrop-filter:blur(18px);

            box-shadow:0 10px 35px rgba(0,0,0,.25);

            color:white;

            animation:fadeIn .7s ease;

        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .icon{

            font-size:65px;

            text-align:center;

            margin-bottom:15px;

        }

        .form-control{

            height:50px;

            border-radius:12px;

        }

        .password-wrapper{

            position:relative;

        }

        .toggle-password{

            position:absolute;

            right:15px;

            top:50%;

            transform:translateY(-50%);

            cursor:pointer;

            color:#555;

        }

        .btn-success{

            height:50px;

            border-radius:12px;

            font-size:18px;

            font-weight:bold;

            transition:.3s;

        }

        .btn-success:hover{

            transform:scale(1.03);

        }

        .strength{

            margin-top:8px;

            font-size:14px;

        }

    </style>

</head>

<body>

<div class="card">

    <div class="icon">
        🔑
    </div>

    <h2 class="text-center fw-bold">
        Reset Password
    </h2>

    <p class="text-center mb-4">

        Create a new secure password for your account.

    </p>

    <form action="/reset-password"
          method="post">

        <label class="form-label">

            <i class="fa-solid fa-lock"></i>

            New Password

        </label>

        <div class="password-wrapper">

            <input

                    type="password"

                    id="password"

                    name="password"

                    class="form-control"

                    required>
            <br>

            <label class="form-label">

                <i class="fa-solid fa-lock"></i>

                Confirm Password

            </label>

            <div class="password-wrapper">

                <input

                        type="password"

                        id="confirmPassword"

                        class="form-control"

                        required>

                <i class="fa-solid fa-eye toggle-password"
                   onclick="toggleConfirmPassword()"></i>

            </div>

            <div id="matchMessage"
                 class="mt-2 fw-bold">

            </div>

            <i class="fa-solid fa-eye toggle-password"
               onclick="togglePassword()"></i>

        </div>

        <div class="strength">

            Password Strength:
            <span id="strengthText">
                Weak
            </span>

        </div>

        <button

                id="updateBtn"

                type="submit"

                class="btn btn-success w-100 mt-4"

                disabled>

            <i class="fa-solid fa-check"></i>

            Update Password

        </button>

            <i class="fa-solid fa-check"></i>

            Update Password

        </button>

    </form>

</div>

<script>

    function togglePassword(){

        function toggleConfirmPassword(){

            let confirm=document.getElementById("confirmPassword");

            if(confirm.type==="password"){

                confirm.type="text";

            }else{

                confirm.type="password";

            }

        }

        let password=document.getElementById("password");

        if(password.type==="password"){

            password.type="text";

        }else{

            password.type="password";

        }

    }

    document.getElementById("password").addEventListener("input",function(){

        let password=this.value;

        let strength=document.getElementById("strengthText");

        if(password.length<6){

            strength.innerHTML="Weak";

            strength.style.color="red";

        }

        else if(password.length<10){

            strength.innerHTML="Medium";

            strength.style.color="orange";

        }

        else{

            strength.innerHTML="Strong";

            strength.style.color="lime";

        }

    });

    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const message = document.getElementById("matchMessage");
    const button = document.getElementById("updateBtn");

    function checkPasswords(){

        if(confirmPassword.value.length === 0){

            message.innerHTML = "";
            button.disabled = true;
            return;

        }

        if(password.value === confirmPassword.value){

            message.innerHTML = "✔ Passwords Match";
            message.style.color = "lime";

            button.disabled = false;

        }else{

            message.innerHTML = "❌ Passwords do not match";
            message.style.color = "red";

            button.disabled = true;

        }

    }

    password.addEventListener("keyup", checkPasswords);
    confirmPassword.addEventListener("keyup", checkPasswords);

</script>

</body>
</html>
