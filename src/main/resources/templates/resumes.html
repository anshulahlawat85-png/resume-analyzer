<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Resume List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>
<body class="container mt-5">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">

        <a class="navbar-brand" href="/resumes">
            Resume Analyzer
        </a>

        <div class="navbar-nav">
            <a class="nav-link" href="/resumes">Resume List</a>
            <a class="nav-link" href="/add-resume">Add Resume</a>
            <a class="nav-link" href="/upload">Upload PDF</a>
            <a class="nav-link" href="/history">History</a>
        </div>

    </div>
</nav>
<div class="row mb-4">

    <div class="col-md-4">
        <div class="card text-bg-primary">
            <div class="card-body">
                <h5>Total Resumes</h5>
                <h2 th:text="${#lists.size(resumes)}"></h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-bg-success">
            <div class="card-body">
                <h5>Project Status</h5>
                <h2>ATS Ready</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-bg-dark">
            <div class="card-body">
                <h5>Database</h5>
                <h2>MySQL + PDF</h2>
            </div>
        </div>
    </div>

</div>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Resume List</h2>

    <a href="/add-resume" class="btn btn-success">
        Add Resume
    </a>
</div>
<form action="/search" method="get" class="mb-4">

    <div class="input-group">

        <input type="text"
               name="keyword"
               class="form-control"
               placeholder="Search by Name">

        <button class="btn btn-primary" type="submit">
            Search
        </button>

        <a href="/resumes" class="btn btn-secondary">
            Reset
        </a>

    </div>

</form>

<table class="table table-bordered table-striped table-hover">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Skills</th>
        <th>ATS Score</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="resume : ${resumes}">
        <td th:text="${resume.id}"></td>
        <td th:text="${resume.name}"></td>
        <td th:text="${resume.email}"></td>
        <td th:text="${resume.skills}"></td>
        <td>
    <span th:if="${resume.atsScore >= 80}"
          class="badge bg-success"
          th:text="${resume.atsScore}">
    </span>

            <span th:if="${resume.atsScore >= 60 and resume.atsScore < 80}"
                  class="badge bg-warning text-dark"
                  th:text="${resume.atsScore}">
    </span>

            <span th:if="${resume.atsScore < 60}"
                  class="badge bg-danger"
                  th:text="${resume.atsScore}">
    </span>
        </td>
        <td>
            <a th:href="@{/edit/{id}(id=${resume.id})}"
               class="btn btn-primary btn-sm">
                Edit
            </a>

            <a th:href="@{/delete/{id}(id=${resume.id})}"
               class="btn btn-danger btn-sm">
                Delete
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
