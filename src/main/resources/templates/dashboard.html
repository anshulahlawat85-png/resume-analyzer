<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f7fa;
        }

        .navbar{
            box-shadow:0 4px 12px rgba(0,0,0,.15);
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.12);
            transition:all .3s ease;
            overflow:hidden;
        }

        .card:hover{
            transform:translateY(-8px);
            box-shadow:0 15px 35px rgba(0,0,0,.20);
        }

        .card:hover{
            transform:translateY(-6px);
        }

        .stat{
            font-size:40px;
            font-weight:bold;
        }
        .card-icon{
            font-size:40px;
            margin-bottom:15px;
        }

        .blue{
            color:#0d6efd;
        }

        .green{
            color:#198754;
        }

        .orange{
            color:#fd7e14;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/dashboard">
            🚀 Resume Analyzer
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-4">

                <li class="nav-item">
                    <a class="nav-link active"
                       href="/dashboard">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/upload">
                        Analyze Resume
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="/history">
                        History
                    </a>
                </li>

            </ul>

            <div class="ms-auto d-flex align-items-center">

                <span class="text-white me-3">

                    👋 <span th:text="${username}"></span>

                </span>

                <a href="/logout"
                   class="btn btn-outline-light">

                    Logout

                </a>

            </div>

        </div>

    </div>

</nav>



<div class="container mt-5">

    <div class="card p-5 mb-5 bg-primary text-white">

        <h2>

            👋 Welcome,

            <span th:text="${username}"></span>

        </h2>

        <p class="mb-0">

            Manage your resumes, track ATS scores and improve your profile.

        </p>

    </div>

    <div class="row mt-4">

        <div class="col-md-4">

            <div class="card p-4">

                <i class="fas fa-file-alt card-icon blue"></i>

                <h5>Total Analyses</h5>

                <div class="stat text-primary"
                     th:text="${totalAnalyses}">

                    0

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-4">

                <i class="fas fa-trophy card-icon green"></i>

                <h5>Highest ATS</h5>

                <div class="stat text-success"
                     th:text="${highestScore}">

                    0

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-4">

                <i class="fas fa-chart-line card-icon orange"></i>

                <h5>Average ATS</h5>

                <div class="stat text-warning"
                     th:text="${averageScore}">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="row mt-5">

        <div class="col-md-6">

            <a href="/upload"
               class="btn btn-primary w-100 p-3">

                📄 Analyze Resume

            </a>

        </div>

        <div class="col-md-6">

            <a href="/history"
               class="btn btn-success w-100 p-3">

                📊 View History

            </a>

        </div>

    </div>
    <div class="card mt-5 p-4">

        <h4>📄 Latest Resume</h4>

        <div th:if="${latestResume != null}">

            <h5 th:text="${latestResume.fileName}"></h5>

            <p>
                ATS Score :
                <strong th:text="${latestResume.atsScore} + '%'"></strong>
            </p>

            <p class="text-muted">

                📅 <span th:text="${formattedDate}"></span>

            </p>

        </div>

        <div th:if="${latestResume == null}">

            <p>No resume analyzed yet.</p>

        </div>

    </div>

</div>

</body>
</html>
